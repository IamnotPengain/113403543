<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Heading Styles Exact Copy</title>
    <style>
        body {
            font-family: serif;
            padding: 40px;
            background-color: white;
        }

        .h1-style {
            font-size: 36px;
            font-weight: bold;
            text-decoration: overline;
            text-decoration-thickness: 3px;
            text-shadow: 2px 2px 0px pink; 
            margin-bottom: 30px;
        }

        .h2-style {
            font-size: 28px;
            font-style: italic;
            background-color: white;
            
            border: 2px solid gray;
            outline: 2px solid yellow;
            
            padding: 5px 10px;
            width: 90%;
            margin-bottom: 30px;
            margin-left: 5px;
        }

        .h3-style {
            font-size: 24px;
            text-align: right;
            text-decoration: underline;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="h1-style">This is heading 1</div>
    <div class="h2-style">This is heading 2</div>
    <div class="h3-style">This is heading 3</div>

</body>
</html>
