<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        .styled-table {
            border-collapse: collapse;
            width: 300px;
            border: 2px solid #777;
            font-family: serif;
        }

        .styled-table th, .styled-table td {
            border: 1px solid #777;
            padding: 10px;
            text-align: left;
        }

        .styled-table thead th {
            background-color: #808080;
            color: white;
        }

        .yellow-bg {
            background-color: #ffff00;
        }

        .fixed-box {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 120px;
            height: 120px;
            border: 3px solid #7ebc59;
            padding: 10px;
            background-color: white;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <table class="styled-table">
        <thead>
            <tr>
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
        </thead>
        <tbody>
            <tr class="yellow-bg">
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2</td>
                <td>2</td>
            </tr>
            <tr class="yellow-bg">
                <td>3</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>

    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
