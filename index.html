<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>學生資料表格</title>
    <style>
        table {
            border-collapse: collapse;
            width: 300px;
        }

        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 5px;
            text-align: left;
        }
        th {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Student ID</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>柯羿</td>
                <td>113403543</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
