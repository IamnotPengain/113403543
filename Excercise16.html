<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Hello World Borders</title>
    <style>
        body {
            font-family: serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f0f0f0;
        }

        .container {
            background-color: white;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 5px;
            width: 450px;
        }

        .box {
            margin-bottom: 20px;
            padding: 10px;
            font-size: 28px;
            font-weight: bold;
        }
        .box-1 {
            background-color: #add8e6;
            border: 5px double #ff6347;
            color: black;
        }
        .box-2 {
            background-color: yellow;
            border: 3px solid #1e90ff;
            border-radius: 15px;
            color: black;
        }
        .box-3 {
            background-color: #3cb371;
            border: 8px dotted #808080;
            color: black;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box box-1">Hello World</div>
        <div class="box box-2">Hello World</div>
        <div class="box box-3">Hello World</div>
    </div>

</body>
</html>
